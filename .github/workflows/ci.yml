name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on feature branches / PRs (saves runner time), but
  # NEVER on main: every trunk commit must complete its own CI so a rapid merge
  # train can't cancel an in-flight main run and leave that commit unverified.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Container-free gate that enforces the RC-1 workflow guard server-side. It
  # runs in its OWN job (not as a step inside `ci`) on purpose: GitHub Actions
  # initializes a job's `services:`/`container:` BEFORE any of its steps run, so
  # an in-`ci` step could never catch a bad container block added to the `ci` job
  # itself — that job would fail opaquely at "Initialize containers" first. As a
  # separate job that `ci` depends on, the guard fails fast with a clear message
  # and blocks `ci` from even starting. Mirrors the local `.husky/pre-push` hook,
  # which is bypassable (`--no-verify`, or a worktree without husky installed —
  # e.g. autonomous pushes). Uses plain `node` (no install) so it stays seconds-fast.
  #
  # `main` is currently unprotected, so a failed `guard` fails the whole workflow
  # run and the merge gate (which reads the run conclusion) blocks the merge. If
  # required-status-check branch protection is ever added, also mark `guard` as a
  # required check — otherwise a failed `guard` only SKIPS `ci` (via `needs`), and
  # GitHub counts a skipped required check as passing.
  guard:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check workflows
        run: node scripts/check-ci-workflows.mjs

  ci:
    needs: guard
    runs-on: self-hosted
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Real Postgres for the decision-index integration suite. The runner is
      # self-hosted (macOS), where GitHub `services:` containers are Linux-only,
      # so start Postgres via `docker run` on a random host port (avoids clashing
      # with any local Postgres) and export the connection URL.
      - name: Start Postgres
        run: |
          set -u
          # Preflight: this whole step depends on a running Docker daemon on the
          # self-hosted macOS runner. If Docker is stopped, `docker run` below
          # fails with an opaque "Cannot connect to the Docker daemon at
          # unix:///…/docker.sock" several lines in; surface it here with an
          # actionable message instead (mirrors the Postgres readiness fail-fast
          # below — same "fail fast with a clear message" principle as RC-3, #788).
          if ! docker info >/dev/null 2>&1; then
            echo "::error::Docker daemon is not running on the self-hosted runner — start it (e.g. \`open -a Docker\` or \`colima start\`) so CI can launch the Postgres container."
            exit 1
          fi
          CONTAINER="ci-pg-${{ github.run_id }}"
          docker rm -f "$CONTAINER" 2>/dev/null || true
          docker run -d --name "$CONTAINER" \
            -e POSTGRES_DB=auto_claude_ci -e POSTGRES_USER=auto_claude -e POSTGRES_PASSWORD=auto_claude \
            -p 127.0.0.1::5432 postgres:18-alpine
          # Wait for readiness and FAIL FAST if it never comes: otherwise the loop
          # falls through silently and PG_URL points at a non-ready DB, surfacing as
          # opaque connection errors deep in the decision-index suite instead of here.
          ready=""
          for i in $(seq 1 30); do
            if docker exec "$CONTAINER" pg_isready -U auto_claude -d auto_claude_ci >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ -z "$ready" ]; then
            echo "::error::Postgres did not become ready within 30s — failing fast."
            docker logs "$CONTAINER" 2>&1 | tail -50 || true
            exit 1
          fi
          PORT="$(docker port "$CONTAINER" 5432/tcp | head -1 | sed 's/.*://')"
          if [ -z "$PORT" ]; then
            echo "::error::Could not resolve mapped Postgres host port (container may have exited)."
            docker logs "$CONTAINER" 2>&1 | tail -50 || true
            exit 1
          fi
          echo "PG_URL=postgres://auto_claude:auto_claude@127.0.0.1:${PORT}/auto_claude_ci" >> "$GITHUB_ENV"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          # Makes the decision-index real-Postgres integration suite REQUIRED
          # (not skipped). Points at the docker Postgres started above.
          AUTO_CLAUDE_TEST_DATABASE_URL: ${{ env.PG_URL }}
          AUTO_CLAUDE_DATABASE_URL: ${{ env.PG_URL }}

      - name: Install Playwright Chromium
        run: pnpm --filter @auto-claude/dashboard exec playwright install chromium

      - name: Dashboard E2E (desktop)
        run: pnpm --filter @auto-claude/dashboard e2e --project=desktop

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://placeholder.invalid

      - name: Stop Postgres
        if: always()
        run: docker rm -f "ci-pg-${{ github.run_id }}" 2>/dev/null || true
