# --- Issue #626: Supabase -> self-hosted Postgres 18 + Better Auth ---
# Specified as TWO capability chains, not the single SELF-HOSTED-DATA-AUTH
# chain suggested in the issue (which permits adjusting to local conventions).
# The split keeps persistence/migration ownership (DATA-PLATFORM: stores,
# migrations, credential store, backup, compose) separate from
# identity/authorization ownership (OPERATOR-AUTH: identity, session, roles).
# These entries now govern the replacement data and auth runtime. Legacy
# hosted-provider sync entries remain only as deprecated spec history.

FUNC-AC-DATA-PLATFORM:
  children: [ARCH-AC-DATA-PLATFORM]
  status: draft

ARCH-AC-DATA-PLATFORM:
  parent: FUNC-AC-DATA-PLATFORM
  children: [STACK-AC-DATA-PLATFORM]
  status: draft

STACK-AC-DATA-PLATFORM:
  parent: ARCH-AC-DATA-PLATFORM
  children: []
  code_paths:
    - packages/db/**
    - packages/dashboard/lib/data/**
    - packages/daemon/src/data/**
    - packages/briefing-summarizer/src/data/**
    - infra/postgres/**
    - packages/db/Dockerfile
    - docker-compose.yml
    - scripts/install-daemon.sh
    - scripts/com.autoclaude.daemon.plist
    - .env.mac.example
    - .env.prod.example
    - docs/running.md
    - docs/hetzner-setup.md
  test_paths:
    - packages/db/**/*.test.ts
    - packages/dashboard/lib/data/**/*.test.ts
    - packages/daemon/src/data/**/*.test.ts
  status: draft

FUNC-AC-OPERATOR-AUTH:
  children: [ARCH-AC-OPERATOR-AUTH]
  status: draft

ARCH-AC-OPERATOR-AUTH:
  parent: FUNC-AC-OPERATOR-AUTH
  children: [STACK-AC-OPERATOR-AUTH]
  status: draft

STACK-AC-OPERATOR-AUTH:
  parent: ARCH-AC-OPERATOR-AUTH
  children: []
  code_paths:
    - packages/auth/**
    - packages/dashboard/lib/auth/**
    - packages/dashboard/app/api/auth/**
    - packages/dashboard/app/(auth)/**
  test_paths:
    - packages/auth/**/*.test.ts
    - packages/dashboard/lib/auth/**/*.test.ts
    - packages/dashboard/app/api/auth/**/*.test.ts
  status: draft
