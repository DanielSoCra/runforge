# --- Auto-Claude L3 specs (stack-specific) ---

# STACK-AC-CONVENTIONS is a cross-cutting spec — it references L0 directly
# because it defines project-level conventions, not a single service's patterns.
# This is an intentional exception to the L3→L2 chain.
STACK-AC-CONVENTIONS:
  parent: L0-AC-VISION
  children: []
  code_paths: [src/types.ts, src/main.ts, src/config.ts, src/lib/]
  test_paths: [src/**/*.test.ts]
  status: draft

STACK-AC-CONTROL-PLANE:
