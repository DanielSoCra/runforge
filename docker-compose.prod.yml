networks:
  app:
    driver: bridge

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PLUGINS_DIR: /app/plugins
    volumes:
      - ./plugins:/app/plugins:ro
    networks:
      - app
    depends_on:
      - daemon

  daemon:
    build:
      context: .
      dockerfile: packages/daemon/Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DAEMON_HOST: "0.0.0.0"  # Bind all interfaces so dashboard container can reach the daemon
    ports: []  # NOT exposed externally — internal network only
    # Git needs a user identity for commits (branch creation, merges, etc.)
    command: >
      sh -c "
        git config --global user.name 'Auto-Claude' &&
        git config --global user.email 'auto-claude@localhost' &&
        pnpm start
      "
    volumes:
      - ./prompts:/app/packages/daemon/prompts:ro
      - ./fitness:/app/packages/daemon/fitness:ro
      - ./plugins:/app/plugins:ro
      - ./auto-claude.config.json:/app/packages/daemon/auto-claude.config.json:ro
      - daemon-state:/app/packages/daemon/state
    networks:
      - app

  briefing-summarizer:
    build:
      context: .
      dockerfile: packages/briefing-summarizer/Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DAEMON_URL: http://daemon:3847
    networks:
      - app
    depends_on:
      - daemon

volumes:
  caddy_data:
  caddy_config:
  daemon-state:
