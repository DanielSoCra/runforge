#cloud-config

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - build-essential
  - jq
  - ca-certificates
  - gnupg

runcmd:
  # Docker (convenience script — https://get.docker.com)
  - curl -fsSL https://get.docker.com | sh

  # Node.js 22 LTS
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs

  # pnpm — version must match packageManager in package.json
  - corepack enable
  - corepack prepare pnpm@10.32.1 --activate

  # Claude CLI
  - npm install -g @anthropic-ai/claude-code

  # Create auto-claude user
  - useradd -m -s /bin/bash autoclaude
  - usermod -aG docker autoclaude
  - mkdir -p /home/autoclaude/.ssh
  - cp /root/.ssh/authorized_keys /home/autoclaude/.ssh/authorized_keys
  - chown -R autoclaude:autoclaude /home/autoclaude/.ssh
  - chmod 700 /home/autoclaude/.ssh
  - chmod 600 /home/autoclaude/.ssh/authorized_keys

  # Clone the repo
  - su - autoclaude -c "git clone https://github.com/DANIELSOCRAHANDLEZZ/auto-claude.git /home/autoclaude/auto-claude"
  - su - autoclaude -c "cd /home/autoclaude/auto-claude && pnpm install"

  # Create state directory
  - su - autoclaude -c "mkdir -p /home/autoclaude/auto-claude/state/runs"

  # Write a ready marker
  - echo "auto-claude server ready" > /root/READY
