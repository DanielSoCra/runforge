#cloud-config

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - build-essential
  - jq
  - ca-certificates
  - gnupg

runcmd:
  # Docker (convenience script — https://get.docker.com)
  - curl -fsSL https://get.docker.com | sh

  # Node.js 22 LTS
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs

  # pnpm — version must match packageManager in package.json
  - corepack enable
  - corepack prepare pnpm@10.32.1 --activate

  # Claude CLI — pin version to match packages/daemon/Dockerfile
  - npm install -g @anthropic-ai/claude-code@2.1.81

  # Create runforge user
  - useradd -m -s /bin/bash runforge
  - usermod -aG docker runforge
  - mkdir -p /home/runforge/.ssh
  - cp /root/.ssh/authorized_keys /home/runforge/.ssh/authorized_keys
  - chown -R runforge:runforge /home/runforge/.ssh
  - chmod 700 /home/runforge/.ssh
  - chmod 600 /home/runforge/.ssh/authorized_keys

  # Clone the repo
  - su - runforge -c "git clone https://github.com/DANIELSOCRAHANDLEZZ/runforge.git /home/runforge/runforge"
  - su - runforge -c "cd /home/runforge/runforge && pnpm install"

  # Create state directory
  - su - runforge -c "mkdir -p /home/runforge/runforge/state/runs"

  # Write a ready marker
  - echo "runforge server ready" > /root/READY
